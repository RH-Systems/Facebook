<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Mobile Space Shooter</title>
<style>
body {
  margin:0; background:black; font-family:Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; overflow:hidden;
}
#scoreboard {color:#0f0;font-size:20px;margin:10px;}
canvas {border:2px solid #0f0;}
#controls {display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(2,60px);gap:5px;margin-top:10px;}
.button {
  width:60px; height:60px; background:#222; color:#0f0; display:flex; justify-content:center; align-items:center;
  border-radius:10px; box-shadow:0 0 10px #0f0; user-select:none; touch-action:none; font-size:24px;
}
.button:active {background:#0f0;color:#000;box-shadow:0 0 20px #0f0;}
</style>
</head>
<body>
<div id="scoreboard">Score: 0 | High: 0 | Level: 1</div>
<canvas id="game" width="400" height="600"></canvas>
<div id="controls">
  <div></div><div class="button" id="up">↑</div><div></div>
  <div class="button" id="left">←</div>
  <div class="button" id="down">↓</div>
  <div class="button" id="right">→</div>
  <div class="button" id="fire">⚡</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let score=0,level=1,highScore=localStorage.getItem('shooterHigh')||0;
let player={x:180,y:520,w:40,h:40,dx:0,dy:0};
let bullets=[],enemies=[],particles=[],powerUps=[];
let speedCounter=0;

// --- Sounds ---
const shootSound=new Audio('https://freesound.org/data/previews/331/331912_3248244-lq.mp3');
const explodeSound=new Audio('https://freesound.org/data/previews/82/82507_102265-lq.mp3');

// --- Helpers ---
function rand(max){return Math.floor(Math.random()*max);}
function addParticles(x,y,color){
  for(let i=0;i<8;i++){particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20,color});}
}

// --- Enemy Spawn ---
function spawnEnemy(){ 
  let type=Math.random()<0.3?'fast':'normal';
  enemies.push({x:rand(360),y:-40,w:40,h:40,dy:type==='fast'?3:1.5,type}); 
}
setInterval(spawnEnemy,1000-level*0.1);

// --- Controls ---
function movePlayer(dx,dy){player.dx=dx;player.dy=dy;}
['up','down','left','right'].forEach(id=>{
  document.getElementById(id).addEventListener('touchstart',()=>{switch(id){case'up':movePlayer(0,-5);break;case'down':movePlayer(0,5);break;case'left':movePlayer(-5,0);break;case'right':movePlayer(5,0);break;}});
  document.getElementById(id).addEventListener('touchend',()=>movePlayer(0,0));
});
document.getElementById('fire').addEventListener('touchstart',()=>bullets.push({x:player.x+15,y:player.y-10,w:10,h:20,dy:-10}));

// --- Game Loop ---
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // Move player
  player.x+=player.dx; player.y+=player.dy;
  player.x=Math.max(0,Math.min(360,player.x));
  player.y=Math.max(0,Math.min(560,player.y));
  ctx.fillStyle='cyan'; ctx.fillRect(player.x,player.y,player.w,player.h);

  // Move bullets
  bullets.forEach((b,i)=>{b.y+=b.dy; ctx.fillStyle='yellow'; ctx.fillRect(b.x,b.y,b.w,b.h); if(b.y<0) bullets.splice(i,1);});

  // Move enemies
  enemies.forEach((e,i)=>{
    e.y+=e.dy;
    ctx.fillStyle=e.type==='fast'?'orange':'red';
    ctx.fillRect(e.x,e.y,e.w,e.h);

    bullets.forEach((b,j)=>{
      if(b.x<b.x+e.w && b.x+b.w>e.x && b.y<b.y+e.h && b.y+b.h>e.y){
        bullets.splice(j,1); enemies.splice(i,1);
        score+=1; addParticles(e.x,e.y,'red');
        level = Math.floor(score/10)+1;
        highScore=Math.max(highScore,score); localStorage.setItem('shooterHigh',highScore);
        document.getElementById('scoreboard').innerText=`Score: ${score} | High: ${highScore} | Level: ${level}`;
      }
    });

    if(player.x<e.x+e.w && player.x+player.w>e.x && player.y<e.y+e.h && player.y+player.h>e.y){
      alert("Game Over! Score: "+score); score=0; player.x=180; player.y=520; bullets=[]; enemies=[]; particles=[];
      document.getElementById('scoreboard').innerText=`Score: 0 | High: ${highScore} | Level: 1`;
    }

    if(e.y>600) enemies.splice(i,1);
  });

  // Update particles
  particles.forEach((p,i)=>{p.x+=p.vx; p.y+=p.vy; p.life--; ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(p.life/20,0); ctx.fillRect(p.x,p.y,2,2); ctx.globalAlpha=1; if(p.life<=0) particles.splice(i,1);});

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
